<!doctype html>
<html>
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 480px;
        position: relative;
        overflow: hidden;
      }

      /* Container do Logo Superior Direito */
      .logo-header {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 70px; /* Tamanho discreto */
        height: auto;
      }

      h2 {
        color: #1a73e8;
        text-align: left;
        margin-bottom: 5px;
        margin-top: 0;
        padding-right: 80px;
      }
      p.subtitle {
        text-align: left;
        color: #666;
        font-size: 13px;
        margin-bottom: 25px;
        padding-right: 80px;
      }

      label {
        display: block;
        margin-top: 15px;
        font-weight: 600;
        color: #444;
        font-size: 14px;
      }
      select,
      input {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
        outline: none;
        transition: 0.2s;
      }
      select:focus,
      input:focus {
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
      }

      .input-erro {
        border: 2px solid #d93025 !important;
        background-color: #fce8e6;
      }
      .msg-erro {
        color: #d93025;
        font-size: 12px;
        margin-top: 4px;
        display: none;
        font-weight: 500;
      }

      select:disabled {
        background-color: #f1f3f4;
        cursor: not-allowed;
        color: #9aa0a6;
      }

      button {
        width: 100%;
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 15px;
        margin-top: 30px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #1557b0;
      }
      button:disabled {
        background-color: #bdc1c6;
        cursor: wait;
      }

      /* Rodapé de Autoria */
      .footer-credits {
        margin-top: 30px;
        text-align: center;
        font-size: 11px;
        color: #9aa0a6;
        border-top: 1px solid #eee;
        padding-top: 15px;
      }
    </style>
  </head>

          <option value="2">2ª GRS - Guarabira</option>
          <option value="3">3ª GRS - Campina Grande</option>
          <option value="4">4ª GRS - Cuité</option>
          <option value="5">5ª GRS - Monteiro</option>
          <option value="6">6ª GRS - Patos</option>
          <option value="7">7ª GRS - Piancó</option>
          <option value="8">8ª GRS - Catolé do Rocha</option>
          <option value="9">9ª GRS - Cajazeiras</option>
          <option value="10">10ª GRS - Sousa</option>
          <option value="11">11ª GRS - Princesa Isabel</option>
          <option value="12">12ª GRS - Itabaiana</option>
        </select>

        <label>Tipo de Movimentação</label>
        <select id="tipo" required onchange="toggleMuni()">
          <option value="">Selecione...</option>
          <option value="Recebimento">Recebimento (Entrada)</option>
          <option value="Entrega">Entrega (Saída)</option>
        </select>

        <div id="erroDataMov" class="msg-erro">

        </div>

        <label>Inseticida</label>
        <select id="prod" required onchange="atualizarPlaceholder()">

          <option value="BTI">BTI</option>
          <option value="Fludora">Fludora</option>
          <option value="Alfacipermetrina">Alfacipermetrina</option>
        </select>

        <label id="lblQnty">Quantidade</label>

          type="number"
          id="qnty"
          placeholder="Selecione o produto primeiro"
          required
          min="1"
        />

        <label>Lote</label>
        <input type="text" id="lote" placeholder="Ex: LOTE2026" required />

        <label>Data de Validade</label>
        <input type="date" id="vali" required onchange="validarValidade()" />

      window.onload = function () {
        let hoje = new Date().toISOString().split("T")[0];
        document.getElementById("data").setAttribute("max", hoje);
      };

      function filtrarMunicipios() {
        const grs = document.getElementById("grs").value;
        const muniSelect = document.getElementById("muni");
        const tipo = document.getElementById("tipo").value;
        muniSelect.innerHTML =
          '<option value="">Selecione o Município...</option>';
        if (grs && municipiosPorGRS[grs]) {
          municipiosPorGRS[grs].sort().forEach((m) => {
            let opt = document.createElement("option");
            opt.value = m;
            opt.innerHTML = m;
            muniSelect.appendChild(opt);
          });
          if (tipo !== "Recebimento") muniSelect.disabled = false;
        } else {
          muniSelect.disabled = true;
        }
      }

      function atualizarPlaceholder() {
        let produto = document.getElementById("prod").value;
        let campoQnty = document.getElementById("qnty");
        if (produto === "BTI") campoQnty.placeholder = "Potes de 500g";
        else if (produto === "Fludora") campoQnty.placeholder = "Sachês";
        else if (produto === "Alfacipermetrina")
          campoQnty.placeholder = "Frascos de 1L";
        else campoQnty.placeholder = "Selecione o produto primeiro";
      }

      function toggleMuni() {
        let tipo = document.getElementById("tipo").value;
        let muni = document.getElementById("muni");
        let grs = document.getElementById("grs").value;
        muni.disabled = tipo === "Recebimento" || !grs;
        if (muni.disabled) muni.value = "";
      }

      function validarDataMov() {
        let campo = document.getElementById("data");
        let erro = document.getElementById("erroDataMov");
        let hoje = new Date().toISOString().split("T")[0];
        if (campo.value && campo.value > hoje) {
          alert("Data não válida");
          campo.classList.add("input-erro");
          erro.style.display = "block";
          campo.value = "";
        } else {
          campo.classList.remove("input-erro");
          erro.style.display = "none";
        }
      }

      function validarValidade() {
        let campo = document.getElementById("vali");
        let erro = document.getElementById("erroValidade");
        let hoje = new Date().toISOString().split("T")[0];
        if (campo.value && campo.value < hoje) {
          campo.classList.add("input-erro");
          erro.style.display = "block";
        } else {
          campo.classList.remove("input-erro");
          erro.style.display = "none";
        }
      }

      function enviar() {
        let btn = document.getElementById("btnEnviar");
        let form = document.getElementById("meuForm");
        let dados = {
          grs: document.getElementById("grs").value,
          tipo: document.getElementById("tipo").value,
          data: document.getElementById("data").value,
          muni: document.getElementById("muni").value,
          prod: document.getElementById("prod").value,
          lote: document.getElementById("lote").value,
          vali: document.getElementById("vali").value,
          qnty: document.getElementById("qnty").value,
        };

        if (
          !dados.grs ||
          !dados.tipo ||
          !dados.data ||
          !dados.prod ||
          !dados.qnty ||
          !dados.lote ||
          !dados.vali
        ) {
          alert("Por favor, preencha todos os campos.");
          return;
        }
        if (dados.tipo === "Entrega" && !dados.muni) {
          alert("Selecione o Município.");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Salvando...";

        google.script.run
          .withSuccessHandler(function () {
            alert("✅ Registrado com sucesso!");
            form.reset();
            atualizarPlaceholder();
            toggleMuni();
            btn.disabled = false;
            btn.innerText = "Salvar";
          })
          .withFailureHandler(function (err) {
            alert("❌ Erro: " + err);
            btn.disabled = false;
            btn.innerText = "Tentar Novamente";
          })
          .processarForm(dados);
      }
    </script>
